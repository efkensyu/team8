<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Insert title here</title>
</head>
<body>
<form method="post" th:action="@{/team8_start}" th:object="${empFormN}">
	<h1>вҳ…гҒҠиҸ“еӯҗиЁәж–ӯвҳ…</h1>
	<br>
	<h2>гҒӮгҒӘгҒҹгҒ«еҗҲгҒҶгҒҠиҸ“еӯҗгӮ’жҸҗжЎҲгҒ—гҒҫгҒҷвҷӘ</h2>
	<br>
	<p class="name">гғӢгғғгӮҜгғҚгғјгғ гӮ’е…ҘеҠӣгҒ—гҒҰгҒҸгҒ гҒ•гҒ„вҷӘ</p>
	<div class="namebox">
		<input class="name" type="text" th:field="*{name}" />
		</div>
		<div class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
	<br>
	<input class="start" type="submit" name="next" value="гӮ№гӮҝгғјгғҲпјҒ" />
	<br>
	
</form>
